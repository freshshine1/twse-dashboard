name: L3 Fundamentals

on:
  schedule:
    # 00:30 UTC = 08:30 TPE, Mon–Fri. 30 minutes after the L4 us_overnight run so
    # both regime files are available by ~09:00 TPE when you'd typically look at
    # the dashboard before TW market open.
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: l3-fundamentals
  cancel-in-progress: false

jobs:
  fetch_l3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Compute L3 fundamental flags
        run: python feeder_l3.py

      - name: Commit raw L3 file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/raw/l3_fundamentals_*.json
          if git diff --staged --quiet; then
            echo "No new L3 file to commit"
          else
            git commit -m "L3 fundamentals $(date -u +%Y-%m-%d)"
            git push
          fi
