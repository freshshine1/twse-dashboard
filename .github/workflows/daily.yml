name: Daily TWSE fetch

on:
  schedule:
    # 19:00 Taiwan time = 11:00 UTC. Runs AFTER the institutional (T86) data
    # publishes at ~18:00 TPE. (The old 16:30 TPE time ran too early.)
    - cron: '0 11 * * 1-5'   # Mon-Fri
  workflow_dispatch:          # allow manual trigger from the Actions tab

permissions:
  contents: write             # required for git push

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth

      - name: Run feeder
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          NEWS_SHEET_ID: ${{ secrets.NEWS_SHEET_ID }}
        run: python feeder.py

      - name: Commit and push data.json + tickers.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/tickers.json
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
