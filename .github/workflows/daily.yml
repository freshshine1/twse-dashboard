name: Daily TWSE fetch

on:
  schedule:
    # All times Mon-Fri. Taiwan = UTC+8 (no DST).
    # PRIMARY — 19:13 TPE (11:13 UTC). Runs AFTER T86 publishes (~18:00 TPE).
    # Minute is OFF :00 deliberately: top-of-hour is GitHub's worst queue-contention
    # slot, which was drifting this run 3-5h late into TWSE's flaky night window
    # (root cause of the 2026-06-17 stale board).
    - cron: '13 11 * * 1-5'
    # BACKUP A — 23:37 TPE (15:37 UTC), same evening, ~1h after a drifted primary.
    # SELF-HEAL: runs feeder ONLY if the primary left the board stale (selfheal_gate.py).
    - cron: '37 15 * * 1-5'
    # BACKUP B — 02:43 TPE next morning (18:43 UTC). Second self-heal shot, deep night
    # when TWSE is healthiest. Early enough that even ~5h of drift still finishes well
    # before the 09:00 TPE market open.
    - cron: '43 18 * * 1-5'
  workflow_dispatch:          # allow manual trigger from the Actions tab

permissions:
  contents: write             # required for git push

# Shared concurrency group across daily.yml + us_overnight.yml + l3_fundamentals.yml.
# All three workflows push to main; without serialization, a manual trigger of one
# while another is running causes the second push to be rejected as non-fast-forward
# (the cause of run #46's failure: daily ran 15:13 alongside another workflow that
# pushed first). cancel-in-progress=false makes later runs queue, not abort.
concurrency:
  group: twse-dashboard-write
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Decide whether this run does anything. PRIMARY cron + manual dispatch always
      # proceed. BACKUP crons proceed ONLY if the board is stale (primary failed) —
      # otherwise they no-op in seconds, never touching data.json or t86_market_prev.
      # selfheal_gate.py uses system python3 (stdlib only), so it runs before setup.
      - name: Self-heal gate
        id: gate
        run: |
          SCHED="${{ github.event.schedule }}"
          case "$SCHED" in
            "37 15 * * 1-5")
              echo "Backup A 23:37 ($SCHED) — timestamp staleness only (feed not yet rolled)…"
              python3 selfheal_gate.py >> "$GITHUB_OUTPUT"
              ;;
            "43 18 * * 1-5")
              echo "Backup B 02:43 ($SCHED) — timestamp + price-snapshot staleness…"
              python3 selfheal_gate.py --price-aware >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Primary/dispatch trigger ($SCHED) — proceeding unconditionally."
              echo "run=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install requests google-auth

      - name: Run feeder
        if: steps.gate.outputs.run == 'true'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          NEWS_SHEET_ID: ${{ secrets.NEWS_SHEET_ID }}
          ENABLE_MARGIN: "1"
        run: python feeder.py

      # #3b Double-check: independent of feeder's own self-check. Confirms the run
      # actually refreshed the board and the freshness metric is present. Fails LOUD
      # before commit, so a no-op-but-green run can never push a stale board. stdlib
      # only, so it runs on whatever python is on PATH after setup.
      - name: Verify board freshness
        if: steps.gate.outputs.run == 'true'
        run: python3 verify_board.py

      - name: Commit and push data.json + tickers.json
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # MANDATORY outputs — feeder.py writes these on every successful run.
          # (If feeder errored before writing them, the "Run feeder" step above
          # already failed red, so we never reach here.)
          git add docs/data.json docs/tickers.json docs/raw/t86_market_prev.json processed/signal_log.csv

          # OPTIONAL outputs — produced only when their upstream succeeds
          # (taifex OI fetch+parse; verdict_log once seeded). Stage each only if it
          # exists, so a missing optional file can NEVER abort the core commit.
          # NOTE: use `if [ -f ]` not `[ -f ] && git add` — the latter returns
          # non-zero on a missing file and trips Actions' `set -e`, failing the step.
          for f in \
            docs/raw/taifex_oi_latest.json \
            docs/raw/taifex_oi_series.json \
            processed/verdict_log.csv \
          ; do
            if [ -f "$f" ]; then git add "$f"; fi
          done

          if git diff --cached --quiet; then
            echo "::warning::Nothing staged — data.json unchanged this run"
            exit 0
          fi
          git commit -m "chore: daily data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Race-proof push: if the remote has moved since checkout (e.g. a manual
          # commit or another workflow pushed concurrently), rebase our commit
          # on top and try again. Retry once.
          for i in 1 2; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "push attempt $i failed, retrying in 5s…"
            sleep 5
          done
          echo "push failed after retries"
          exit 1
