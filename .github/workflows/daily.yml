name: Daily TWSE fetch

on:
  schedule:
    # 19:00 Taiwan time = 11:00 UTC. Runs AFTER the institutional (T86) data
    # publishes at ~18:00 TPE. (The old 16:30 TPE time ran too early.)
    - cron: '0 11 * * 1-5'   # Mon-Fri
  workflow_dispatch:          # allow manual trigger from the Actions tab

permissions:
  contents: write             # required for git push

# Shared concurrency group across daily.yml + us_overnight.yml + l3_fundamentals.yml.
# All three workflows push to main; without serialization, a manual trigger of one
# while another is running causes the second push to be rejected as non-fast-forward
# (the cause of run #46's failure: daily ran 15:13 alongside another workflow that
# pushed first). cancel-in-progress=false makes later runs queue, not abort.
concurrency:
  group: twse-dashboard-write
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth

      - name: Run feeder
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          NEWS_SHEET_ID: ${{ secrets.NEWS_SHEET_ID }}
          ENABLE_MARGIN: "1"
        run: python feeder.py

      - name: Commit and push data.json + tickers.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/tickers.json docs/raw/t86_market_prev.json docs/raw/taifex_oi_latest.json docs/raw/taifex_oi_series.json processed/signal_log.csv
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore: daily data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Race-proof push: if the remote has moved since checkout (e.g. a manual
          # commit or another workflow pushed concurrently), rebase our commit
          # on top and try again. Retry once.
          for i in 1 2; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "push attempt $i failed, retrying in 5s…"
            sleep 5
          done
          echo "push failed after retries"
          exit 1
