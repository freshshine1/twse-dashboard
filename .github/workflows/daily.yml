name: Daily TWSE fetch

on:
  schedule:
    - cron: '30 8 * * 1-5'   # 16:30 TPE = 08:30 UTC, Mon–Fri
  workflow_dispatch:           # allow manual trigger from Actions tab

permissions:
  contents: write              # required for git push

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth

      - name: Run feeder
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python feeder.py

      - name: Commit and push data.json + tickers.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/tickers.json
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
