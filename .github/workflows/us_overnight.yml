name: US Overnight L4

on:
  schedule:
    # 22:00 UTC = 06:00 TPE NEXT day. The TPE day is one ahead of the UTC day, so
    # to cover Mon–Fri TPE the UTC weekday field is Sun–Thu (0-4), NOT 1-5.
    # US close: 16:00 ET = 04:00 TPE (DST) / 05:00 TPE (standard). 06:00 TPE still
    # sits 1–2h after the US close (quotes settled) and lands ~3h before the 09:00
    # TW open — a wider cushion than the old 08:00 so GitHub cron drift (jobs fire
    # late under queue load; observed ~2.5h on 2026-06-10) is far less likely to
    # push the run past the open. Drift is mitigated, not eliminated — only an
    # external workflow_dispatch trigger could guarantee on-time firing.
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: twse-dashboard-write
  cancel-in-progress: false

jobs:
  fetch_us:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Compute L4 regime tilt
        run: python feeder_us.py

      - name: Commit raw L4 file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/raw/us_overnight_*.json
          if git diff --staged --quiet; then
            echo "No new us_overnight file to commit"
          else
            git commit -m "L4 us_overnight $(date -u +%Y-%m-%d)"
            git push
          fi
